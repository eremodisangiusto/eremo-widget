<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Prenota la tua esperienza all'Eremo di San Giusto, Ostuni — Sofia, la tua assistente di prenotazione personale.">
  <meta name="robots" content="noindex">
  <title>Sofia · Eremo di San Giusto</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Sofia · Eremo di San Giusto">
  <meta property="og:description" content="Prenota camere ed esperienze all'Eremo di San Giusto, Ostuni, Puglia.">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Jost', sans-serif;
      background: #1a1410;
      overflow: hidden;
    }

    /* ── Background page (visible behind the widget on desktop) ── */
    .page-bg {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      pointer-events: none;
      user-select: none;
    }

    .page-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 300;
      color: rgba(200, 169, 126, 0.35);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .page-sub {
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      color: rgba(200, 169, 126, 0.2);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    /* ── Olive branch decoration ── */
    .page-bg svg {
      opacity: 0.08;
      width: clamp(120px, 20vw, 200px);
      height: auto;
    }

    /* ── Widget wrapper — full screen on mobile ── */
    #esj-widget-outer {
      position: fixed;
      bottom: 0;
      right: 0;
      z-index: 100;
    }

    /* Mobile: full screen */
    @media (max-width: 520px) {
      html, body { overflow: hidden; }
      #esj-widget-outer {
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
      /* On mobile the FAB is hidden — widget is always open */
      #esj-fab { display: none !important; }
      #esj-widget {
        position: absolute !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        max-width: none !important;
        max-height: none !important;
        bottom: auto !important;
        right: auto !important;
        border-radius: 0 !important;
        opacity: 1 !important;
        transform: none !important;
        pointer-events: all !important;
      }
    }

    /* Tablet/Desktop: floating widget */
    @media (min-width: 521px) {
      #esj-widget-outer {
        bottom: 0;
        right: 0;
      }
    }

    /* Loading screen */
    #esj-loading {
      position: fixed;
      inset: 0;
      background: #1a1410;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.2rem;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    #esj-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: #c8a97e;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .loading-dots {
      display: flex;
      gap: 6px;
    }

    .loading-dots span {
      width: 5px;
      height: 5px;
      background: rgba(200, 169, 126, 0.6);
      border-radius: 50%;
      animation: ldot 1.2s infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes ldot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

  <!-- Loading screen -->
  <div id="esj-loading">
    <div class="loading-logo">Eremo di San Giusto</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Background (desktop only) -->
  <div class="page-bg" aria-hidden="true">
    <svg viewBox="0 0 200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 260 C100 260 100 40 100 20" stroke="#c8a97e" stroke-width="1.5" stroke-linecap="round"/>
      <ellipse cx="80" cy="80" rx="18" ry="10" fill="#c8a97e" transform="rotate(-30 80 80)"/>
      <ellipse cx="120" cy="100" rx="18" ry="10" fill="#c8a97e" transform="rotate(25 120 100)"/>
      <ellipse cx="75" cy="130" rx="16" ry="9" fill="#c8a97e" transform="rotate(-20 75 130)"/>
      <ellipse cx="125" cy="150" rx="16" ry="9" fill="#c8a97e" transform="rotate(30 125 150)"/>
      <ellipse cx="82" cy="180" rx="14" ry="8" fill="#c8a97e" transform="rotate(-15 82 180)"/>
      <ellipse cx="118" cy="200" rx="14" ry="8" fill="#c8a97e" transform="rotate(20 118 200)"/>
      <ellipse cx="88" cy="225" rx="12" ry="7" fill="#c8a97e" transform="rotate(-10 88 225)"/>
      <ellipse cx="112" cy="240" rx="12" ry="7" fill="#c8a97e" transform="rotate(15 112 240)"/>
    </svg>
    <div class="page-logo">Eremo di San Giusto</div>
    <div class="page-sub">Ostuni &middot; Puglia</div>
  </div>

  <!-- Widget container -->
  <div id="esj-widget-outer">
    <!-- experiences.js + widget.js are loaded here -->
  </div>

  <!-- ═══════════════════════════════════════════════════════
       SCRIPT LOAD ORDER (do not change):
       1. experiences.js  — catalogo esperienze
       2. widget.js       — Sofia widget v3.0
  ══════════════════════════════════════════════════════════ -->
  <script src="/experiences.js"></script>
  <script src="/widget.js"></script>

  <script>
    // Auto-open widget on load + hide loading screen
    window.addEventListener('load', function () {
      var loading = document.getElementById('esj-loading');

      // Hide loading screen after fonts + scripts settle
      setTimeout(function () {
        loading.classList.add('hidden');
        setTimeout(function () { loading.style.display = 'none'; }, 600);

        // On desktop: auto-open the FAB widget
        if (window.innerWidth > 520) {
          var fab = document.getElementById('esj-fab');
          if (fab) fab.click();
        }
        // On mobile: widget is already fullscreen via CSS
      }, 800);
    });
  </script>
</body>
</html>
